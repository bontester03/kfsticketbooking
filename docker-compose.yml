version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: kfs-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kfs}
      POSTGRES_USER: ${POSTGRES_USER:-kfs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kfs}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kfs} -d ${POSTGRES_DB:-kfs}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kfs

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: kfs-azurite
    command: "azurite-blob --blobHost 0.0.0.0 --skipApiVersionCheck"
    ports:
      - "${AZURITE_BLOB_PORT:-10000}:10000"
    volumes:
      - azurite-data:/data
    networks:
      - kfs

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: kfs-api
    depends_on:
      postgres:
        condition: service_healthy
      azurite:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      WEBSITE_TIME_ZONE: Arab Standard Time
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-kfs};Username=${POSTGRES_USER:-kfs};Password=${POSTGRES_PASSWORD:-kfs}"
      Jwt__Issuer: ${JWT_ISSUER:-kfs}
      Jwt__Audience: ${JWT_AUDIENCE:-kfs-clients}
      Jwt__Secret: ${JWT_SECRET:-please-change-me-to-a-long-random-secret-at-least-32-chars}
      Jwt__AccessTokenMinutes: ${JWT_ACCESS_MINUTES:-15}
      Jwt__RefreshTokenDays: ${JWT_REFRESH_DAYS:-7}
      Qr__Issuer: ${QR_ISSUER:-kfs-qr}
      Qr__SigningKey: ${QR_SIGNING_KEY:-please-change-this-separately-from-jwt-secret}
      Auth__SuperAdminPassword: ${SUPER_ADMIN_PASSWORD:-Admin@123}
      Cors__AllowedOrigins__0: ${WEB_PORTAL_ORIGIN:-http://localhost:5173}
      Cors__AllowedOrigins__1: ${WEB_ADMIN_ORIGIN:-http://localhost:5174}
      Cors__AllowedOrigins__2: ${WEB_SCANNER_ORIGIN:-http://localhost:5175}
      Database__RunMigrationsOnStartup: "true"
      Swagger__Enabled: ${SWAGGER_ENABLED:-true}
      # Azurite-backed blob storage for local dev (matches Azure prod path).
      Storage__Provider: AzureBlob
      Storage__ConnectionString: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;"
      Storage__Container: qr-codes
    ports:
      - "${API_PORT:-5080}:8080"
    volumes:
      - api-data:/app/wwwroot
      - api-logs:/app/logs
    networks:
      - kfs

  portal:
    build:
      context: ./web
      dockerfile: Dockerfile
      args: { APP: portal }
    container_name: kfs-portal
    depends_on: [api]
    ports:
      - "${PORTAL_PORT:-5173}:80"
    networks: [kfs]

  admin:
    build:
      context: ./web
      dockerfile: Dockerfile
      args: { APP: admin }
    container_name: kfs-admin
    depends_on: [api]
    ports:
      - "${ADMIN_PORT:-5174}:80"
    networks: [kfs]

  scanner:
    build:
      context: ./web
      dockerfile: Dockerfile
      args: { APP: scanner }
    container_name: kfs-scanner
    depends_on: [api]
    ports:
      - "${SCANNER_PORT:-5175}:80"
    networks: [kfs]

volumes:
  postgres-data:
  azurite-data:
  api-data:
  api-logs:

networks:
  kfs:
    driver: bridge
