version: "3.9"

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: kfs-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-KfsBooking!2024}
    ports:
      - "${SQL_PORT:-1433}:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $$MSSQL_SA_PASSWORD -No -Q 'SELECT 1' || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P $$MSSQL_SA_PASSWORD -Q 'SELECT 1'"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - kfs

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: kfs-api
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Server=sqlserver,1433;Database=${SQL_DB:-kfs};User Id=sa;Password=${MSSQL_SA_PASSWORD:-KfsBooking!2024};TrustServerCertificate=true;Encrypt=false"
      Jwt__Issuer: ${JWT_ISSUER:-kfs}
      Jwt__Audience: ${JWT_AUDIENCE:-kfs-clients}
      Jwt__Secret: ${JWT_SECRET:-please-change-me-to-a-long-random-secret-at-least-32-chars}
      Jwt__AccessTokenMinutes: ${JWT_ACCESS_MINUTES:-15}
      Jwt__RefreshTokenDays: ${JWT_REFRESH_DAYS:-7}
      Qr__Issuer: ${QR_ISSUER:-kfs-qr}
      Qr__SigningKey: ${QR_SIGNING_KEY:-please-change-this-separately-from-jwt-secret}
      Auth__SuperAdminPassword: ${SUPER_ADMIN_PASSWORD:-Admin@123}
      Cors__AllowedOrigins__0: ${WEB_PORTAL_ORIGIN:-http://localhost:5173}
      Cors__AllowedOrigins__1: ${WEB_ADMIN_ORIGIN:-http://localhost:5174}
      Cors__AllowedOrigins__2: ${WEB_SCANNER_ORIGIN:-http://localhost:5175}
      Database__RunMigrationsOnStartup: "true"
      Swagger__Enabled: ${SWAGGER_ENABLED:-true}
    ports:
      - "${API_PORT:-5080}:8080"
    volumes:
      - api-data:/app/wwwroot
      - api-logs:/app/logs
    networks:
      - kfs

volumes:
  sqlserver-data:
  api-data:
  api-logs:

networks:
  kfs:
    driver: bridge
