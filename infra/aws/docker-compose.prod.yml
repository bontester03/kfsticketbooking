# Production overlay for AWS EC2 deploy.
#
# Used together with the base docker-compose.yml at the repo root:
#
#   docker compose \
#     -f docker-compose.yml \
#     -f infra/aws/docker-compose.prod.yml \
#     up -d --build
#
# Differences vs the dev compose:
#   - Adds a Caddy reverse proxy that terminates TLS (Let's Encrypt) and routes
#     parents/admins/gate-staff to the right SPA container by hostname.
#   - Drops Azurite. Blob storage switches to local-disk (served by the API at
#     /static/...). Survives container restarts because /app/wwwroot is a volume.
#   - Removes the host-port mappings for portal/admin/scanner/api — they're
#     only reachable through Caddy on 80/443.
#   - Tells the API to look at the public domain when re-signing blob URLs.

services:
  caddy:
    build:
      context: ./caddy   # custom build with the rate-limit module
    container_name: kfs-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks: [kfs]
    depends_on: [portal, admin, scanner, api]
    # Caddy is lightweight; cap so a runaway log can't starve the API.
    cpus: 0.5
    mem_limit: 256m

  # ----- Override the base services -----

  # The API is the CPU-hot path (BCrypt on login + JIT). Reserve most of the box for it.
  api:
    restart: unless-stopped
    environment:
      Storage__Provider: LocalDisk
      Storage__PublicBaseUrl: https://${KFS_HOST_PORTAL}
      Cors__AllowedOrigins__0: https://${KFS_HOST_PORTAL}
      Cors__AllowedOrigins__1: https://${KFS_HOST_ADMIN}
      Cors__AllowedOrigins__2: https://${KFS_HOST_SCANNER}
      Swagger__Enabled: ${SWAGGER_ENABLED:-false}
      # SMTP works on AWS the same way it does locally; cert-bypass stays off.
      Email__AcceptInvalidCert: "false"
      # Pre-compile + tiered JIT warm-up. Already defaults in .NET 8 but pinned for clarity.
      DOTNET_TieredPGO: "1"
      DOTNET_TC_QuickJitForLoops: "1"
    ports: !reset []
    # Give the API the lion's share of the box: most of the 2 vCPUs and 2 GB RAM.
    cpus: 1.6
    mem_limit: 2g

  portal:
    restart: unless-stopped
    ports: !reset []
    cpus: 0.25
    mem_limit: 192m
  admin:
    restart: unless-stopped
    ports: !reset []
    cpus: 0.25
    mem_limit: 192m
  scanner:
    restart: unless-stopped
    ports: !reset []
    cpus: 0.25
    mem_limit: 192m

  # Azurite isn't used in prod (LocalDisk blob).
  azurite:
    profiles: ["disabled"]

  postgres:
    restart: unless-stopped
    # ~30% of the box for Postgres on t3.large. Bump to 2g/1.5cpus on t3.xlarge.
    cpus: 1.0
    mem_limit: 1g

volumes:
  caddy-data:
  caddy-config:
