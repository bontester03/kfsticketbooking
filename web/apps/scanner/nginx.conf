server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss application/xml text/javascript image/svg+xml font/woff2;
    gzip_min_length 1024;

    location = /config.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location ~* \.(?:css|js|woff2?|ttf|eot|svg|jpg|jpeg|png|gif|ico)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # API upstream is set via env: `api:8080` in docker-compose, `api.railway.internal:8080` on Railway.
    location /api/ {
        proxy_pass ${API_SCHEME}://${API_HOST}:${API_PORT}/api/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name ${API_HOST};
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    error_page 404 /index.html;
}
